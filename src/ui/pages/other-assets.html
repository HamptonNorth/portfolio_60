<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio 60 — Other Assets</title>
        <link rel="stylesheet" href="/css/output.css" />
        <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    </head>
    <body class="bg-brand-25 text-brand-900 min-h-screen flex flex-col">
        <app-navbar></app-navbar>
        <main class="max-w-7xl mx-auto px-6 py-8 flex-1 w-full" id="main-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold text-brand-800">Other Assets</h2>
                <button id="add-asset-btn" class="bg-brand-700 hover:bg-brand-800 text-white font-medium px-5 py-2 rounded-lg transition-colors">Add Asset</button>
            </div>

            <div id="page-messages"></div>

            <!-- Assets table container -->
            <div id="assets-table-container">
                <p class="text-brand-500">Loading other assets...</p>
            </div>

            <!-- Add/Edit form modal (hidden by default) -->
            <div id="asset-form-container" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto mx-4">
                    <h3 id="form-title" class="text-xl font-semibold text-brand-800 mb-4">Add Asset</h3>
                    <form id="asset-form" class="space-y-4">
                        <input type="hidden" id="asset-id" value="" />

                        <div>
                            <label for="user_id" class="block text-sm font-medium text-brand-700 mb-1">User *</label>
                            <select id="user_id" name="user_id" required class="w-full max-w-xs px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500">
                                <option value="">Select user...</option>
                            </select>
                        </div>

                        <div>
                            <label for="description" class="block text-sm font-medium text-brand-700 mb-1">Description *</label>
                            <input type="text" id="description" name="description" maxlength="40" required class="w-full px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. State Pension" />
                        </div>

                        <div>
                            <label for="category" class="block text-sm font-medium text-brand-700 mb-1">Category *</label>
                            <select id="category" name="category" required class="w-full max-w-xs px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500">
                                <option value="">Select category...</option>
                                <option value="pension">Pension</option>
                                <option value="property">Property</option>
                                <option value="savings">Savings</option>
                                <option value="alternative">Alternative Assets</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-brand-700 mb-1">Value type *</label>
                            <div class="flex gap-6">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="value_type" value="recurring" class="text-brand-700" />
                                    <span class="text-base">Recurring income</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="value_type" value="value" class="text-brand-700" />
                                    <span class="text-base">Asset value</span>
                                </label>
                            </div>
                        </div>

                        <div id="frequency-group" class="hidden">
                            <label for="frequency" class="block text-sm font-medium text-brand-700 mb-1">Frequency *</label>
                            <select id="frequency" name="frequency" class="w-full max-w-xs px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500">
                                <option value="">Select frequency...</option>
                                <option value="weekly">Weekly</option>
                                <option value="fortnightly">Fortnightly</option>
                                <option value="4_weeks">4 Weeks</option>
                                <option value="monthly">Monthly</option>
                                <option value="quarterly">Quarterly</option>
                                <option value="6_monthly">6 Monthly</option>
                                <option value="annually">Annually</option>
                            </select>
                        </div>

                        <div>
                            <label for="value" class="block text-sm font-medium text-brand-700 mb-1">Value (GBP) *</label>
                            <input type="number" id="value" name="value" min="0" step="0.01" required class="w-full max-w-xs px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. 845.00" />
                            <p class="text-sm text-brand-400 mt-1">Enter as pounds and pence (e.g. 845.00).</p>
                        </div>

                        <div>
                            <label for="notes" class="block text-sm font-medium text-brand-700 mb-1">Notes</label>
                            <input type="text" id="notes" name="notes" maxlength="60" class="w-full px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="Optional notes" />
                        </div>

                        <div>
                            <label for="executor_reference" class="block text-sm font-medium text-brand-700 mb-1">Executor reference</label>
                            <input type="text" id="executor_reference" name="executor_reference" maxlength="80" class="w-full px-3 py-2 border border-brand-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. Policy SW/2013-45671" />
                        </div>

                        <div id="form-errors" class="text-error text-sm"></div>

                        <div class="flex items-center justify-between pt-2">
                            <div class="flex gap-3">
                                <button type="submit" class="bg-brand-700 hover:bg-brand-800 text-white font-medium px-5 py-2 rounded-lg transition-colors">Save</button>
                                <button type="button" id="cancel-btn" class="bg-brand-100 hover:bg-brand-200 text-brand-700 font-medium px-5 py-2 rounded-lg transition-colors">Cancel</button>
                            </div>
                            <button type="button" id="delete-from-form-btn" class="hidden text-sm text-brand-400 hover:text-red-600 transition-colors">Delete this asset</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Delete confirmation dialog (hidden by default) -->
            <div id="delete-dialog" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm">
                    <h3 class="text-lg font-semibold text-brand-800 mb-3">Confirm Deletion</h3>
                    <p class="text-base text-brand-600 mb-4">Are you sure you want to delete <strong id="delete-asset-desc"></strong>? All change history will also be removed.</p>
                    <div class="flex gap-3 justify-end">
                        <button id="delete-cancel-btn" class="bg-brand-100 hover:bg-brand-200 text-brand-700 font-medium px-4 py-2 rounded-lg transition-colors">Cancel</button>
                        <button id="delete-confirm-btn" class="bg-red-600 hover:bg-red-700 text-white font-medium px-4 py-2 rounded-lg transition-colors">Delete</button>
                    </div>
                </div>
            </div>

            <!-- History modal (hidden by default) -->
            <div id="history-modal" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto mx-4">
                    <h3 id="history-title" class="text-xl font-semibold text-brand-800 mb-4">Change History</h3>
                    <div id="history-content"></div>
                    <div class="flex justify-end mt-4">
                        <button id="history-close-btn" class="bg-brand-100 hover:bg-brand-200 text-brand-700 font-medium px-4 py-2 rounded-lg transition-colors">Close</button>
                    </div>
                </div>
            </div>
        </main>
        <app-footer></app-footer>
        <script src="/js/app.js"></script>
        <script src="/js/components.bundle.js"></script>
        <script src="/js/other-assets.js"></script>
    </body>
</html>
