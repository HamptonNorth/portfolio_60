<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio 60 — Analysis</title>
        <link rel="stylesheet" href="/css/output.css" />
        <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    </head>
    <body class="bg-brand-25 text-brand-900 min-h-screen flex flex-col">
        <app-navbar></app-navbar>
        <main class="max-w-7xl mx-auto px-6 py-8 flex-1 w-full" id="main-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold text-brand-800">Investment Analysis</h2>
                <button id="print-pdf-btn" class="bg-brand-700 hover:bg-brand-800 text-white font-medium px-5 py-2 rounded-lg transition-colors">Print to PDF</button>
            </div>

            <!-- Tab bar -->
            <div class="flex gap-1 mb-4 border-b border-brand-200">
                <button class="analysis-tab px-4 py-2 text-base font-medium rounded-t-lg transition-colors" data-tab="comparison">Comparison</button>
                <button class="analysis-tab px-4 py-2 text-base font-medium rounded-t-lg transition-colors" data-tab="league">League Table</button>
                <button class="analysis-tab px-4 py-2 text-base font-medium rounded-t-lg transition-colors" data-tab="scatter">Risk vs Return</button>
                <button class="analysis-tab px-4 py-2 text-base font-medium rounded-t-lg transition-colors" data-tab="topbottom">Top / Bottom 5</button>
            </div>

            <!-- Benchmark selector (hidden if no benchmarks configured) -->
            <div id="benchmark-selector" class="mb-4 hidden">
                <span class="text-sm text-brand-500 mr-2">Benchmarks:</span>
                <span id="benchmark-checkboxes" class="inline-flex gap-4 flex-wrap"></span>
                <span id="benchmark-max-msg" class="text-xs text-brand-400 ml-2 hidden">(max 3)</span>
            </div>

            <!-- Period selector (hidden when comparison tab is active) -->
            <div id="period-selector" class="flex gap-2 mb-6">
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="1w">1W</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="1m">1M</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="3m">3M</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="6m">6M</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="1y">1Y</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="2y">2Y</button>
                <button class="period-btn px-3 py-1.5 text-sm font-medium rounded-md border transition-colors" data-period="3y">3Y</button>
                <span id="period-info" class="ml-4 text-sm text-brand-500 self-center"></span>
            </div>

            <div id="page-messages"></div>

            <!-- Comparison view -->
            <div id="comparison-view" class="analysis-view hidden">
                <div id="comparison-table-container">
                    <p class="text-brand-500">Loading...</p>
                </div>
            </div>

            <!-- League Table view -->
            <div id="league-view" class="analysis-view hidden">
                <div class="flex items-center gap-4 mb-3">
                    <span class="text-sm text-brand-500">Sort by:</span>
                    <button class="sort-btn text-sm font-medium text-brand-600 hover:text-brand-800 underline" data-sort="return" data-dir="desc">Return ↓</button>
                    <button class="sort-btn text-sm font-medium text-brand-600 hover:text-brand-800" data-sort="name" data-dir="asc">Name</button>
                    <button class="sort-btn text-sm font-medium text-brand-600 hover:text-brand-800" data-sort="type" data-dir="asc">Type</button>
                    <span class="text-brand-300">|</span>
                    <span class="text-sm text-brand-500">Show:</span>
                    <select id="league-limit" class="text-sm border border-brand-300 rounded px-2 py-1 bg-white">
                        <option value="all">All</option>
                        <option value="top10">Top 10</option>
                        <option value="top20">Top 20</option>
                        <option value="bottom10">Bottom 10</option>
                        <option value="bottom20">Bottom 20</option>
                    </select>
                </div>
                <div id="league-table-container">
                    <p class="text-brand-500">Loading...</p>
                </div>
            </div>

            <!-- Risk vs Return scatter view -->
            <div id="scatter-view" class="analysis-view hidden">
                <div style="position: relative; height: 500px;">
                    <canvas id="scatter-chart"></canvas>
                </div>
                <div id="scatter-legend" class="mt-4 flex gap-6 flex-wrap text-sm text-brand-600"></div>
            </div>

            <!-- Top/Bottom view (two separate charts) -->
            <div id="topbottom-view" class="analysis-view hidden">
                <h3 class="text-lg font-medium text-brand-700 mb-2">Top 5 Performers</h3>
                <div style="position: relative; height: 350px;">
                    <canvas id="top-chart"></canvas>
                </div>
                <div id="top-legend" class="mt-3 mb-8"></div>
                <h3 class="text-lg font-medium text-brand-700 mb-2">Bottom 5 Performers</h3>
                <div style="position: relative; height: 350px;">
                    <canvas id="bottom-chart"></canvas>
                </div>
                <div id="bottom-legend" class="mt-3"></div>
            </div>
        </main>
        <app-footer></app-footer>
        <script src="/js/lib/chart.umd.min.js"></script>
        <script src="/js/app.js"></script>
        <script src="/js/components.bundle.js"></script>
        <script src="/js/analysis.js"></script>
    </body>
</html>
